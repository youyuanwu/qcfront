name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "book.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mdBook
        # Version pairing note:
        #   mdbook-katex 0.9.x is the latest STABLE preprocessor release, but it
        #   was built against the mdbook 0.4.x preprocessor protocol. mdbook 0.5.x
        #   changed the preprocessor TOML format, breaking mdbook-katex 0.9.x.
        #   A compatible mdbook-katex (0.10.0) only exists as an alpha pre-release.
        #   We therefore pin to the newest 0.4.x stable mdbook (0.4.52) paired
        #   with katex 0.9.3. Revisit when mdbook-katex publishes a stable 0.10+.
        run: |
          MDBOOK_VERSION=v0.4.52
          MDBOOK_KATEX_VERSION=0.9.3
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin
          curl -sSL "https://github.com/lzanini/mdbook-katex/releases/download/${MDBOOK_KATEX_VERSION}-binaries/mdbook-katex-v${MDBOOK_KATEX_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Build book
        run: mdbook build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
